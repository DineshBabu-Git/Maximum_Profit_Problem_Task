<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://fav.farm/🏢" />
  <title>Max Profit Problem</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Header -->

    <header class="header">
      <h1>🏢 Max Profit Problem</h1>
      <p class="subtitle">Find the maximum earnings by constructing Theatres, Pubs and Commercial Parks within the available time.</p>
    </header>

    <!-- Input Card -->

    <section class="card">
      <label for="timeInput">Enter the "Available Construction Time" and calculate the best construction plan</label>
      <input id="timeInput" type="number" min="1" placeholder="Example: 13">
      <p id="errorMessage" class="error-message"></p>

      <!-- Buttons -->

      <div class="button-group">
        <button id="calculateBtn">Calculate Profit</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>

    <!-- Summary Cards -->

    <section class="summary-section">
      <div class="summary-card">
        <h3>Maximum Earnings</h3>
        <p id="maxProfit">$0</p>
      </div>
      <div class="summary-card">
        <h3>Remaining Time</h3>
        <p id="remainingTime">0</p>
      </div>
      <div class="summary-card">
        <h3>Total Buildings</h3>
        <p id="totalBuildings">0</p>
      </div>
    </section>

    <!-- Solution Card -->

    <section class="card">
      <h2>Best Solution(s)</h2>
      <div id="solutionContainer"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>

</html>
